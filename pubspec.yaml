name: kaalan
description: A new Flutter project.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: '>=3.1.2 <4.0.0'


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  expand_widget: ^3.1.1
  shimmer: ^3.0.0
  go_router: ^11.0.0
  cached_network_image: ^3.3.1 
  http: ^1.1.2
  page_transition: ^2.1.0
  flutter_svg: ^2.0.9
  rive: ^0.12.4
  sqflite: ^2.3.0
  sqflite_common_ffi_web: ^0.4.2+3
  syncfusion_flutter_pdfviewer: ^24.1.45
  flutter_carousel_widget: ^2.2.0
  cloud_firestore: ^4.13.3
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  google_sign_in: ^6.2.1
  firebase_messaging: ^14.7.10
  awesome_notifications_core: ^0.8.0
  awesome_notifications: any
  intl: ^0.19.0
  webview_flutter: ^4.4.4
  awesome_dialog: ^3.2.0
  path: ^1.8.2
  fluttertoast: ^8.2.4
  dropdown_button2: ^2.3.9
  circular_bottom_navigation: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: "^0.13.1"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21 
 
  flutter_lints: ^2.0.0

flutter:

  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/svg/
    - assets/avaters/
    - assets/Backgrounds/
    - assets/icons/
    - assets/RiveAssets/
  # example:
  fonts:
    - family: Nominee
      fonts:
        - asset: assets/fonts/Nominee-Bold.otf
        - asset: assets/fonts/Nominee-Light.otf
    - family: Intel
      fonts:
        - asset: assets/Fonts/Inter-Regular.ttf
        - asset: assets/Fonts/Inter-SemiBold.ttf
          weight: 600
    - family: Poppins
      fonts:
        - asset: assets/Fonts/Poppins-Bold.ttf
          weight: 700
